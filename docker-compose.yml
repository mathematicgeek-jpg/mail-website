version: "3.8"

services:
  database:
    image: mongo:6.0
    container_name: math_geek_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - math_geek_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: math_geek_api
    ports:
      - "8000:8000"
    environment:
      - MONGO_URL=mongodb://database:27017
      - DB_NAME=mathematics_geek
      - JWT_SECRET_KEY=dev_secret_key_change_me
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin123
      - CORS_ORIGINS=http://localhost:3000
    depends_on:
      - database
    networks:
      - math_geek_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: math_geek_web
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - backend
    networks:
      - math_geek_network

volumes:
  mongo_data:

networks:
  math_geek_network:
    driver: bridge
